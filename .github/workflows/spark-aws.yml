name: Spark AWS Integration

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'README.md'
  pull_request:
    types:
      - opened
      - synchronize
      - ready_for_review
      - reopened
    paths-ignore:
      - 'docs/**'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # This env var is used by Swatinem/rust-cache@v2 for the cache
  # key, so we set it to make sure it is always consistent.
  CARGO_TERM_COLOR: always
  # Disable full debug symbol generation to speed up CI build and keep memory down.
  RUSTFLAGS: "-C debuginfo=1"
  RUST_BACKTRACE: "1"
  CARGO_INCREMENTAL: "0"
  CARGO_BUILD_JOBS: "1"

jobs:
  glue-s3-integration-test:
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    name: Glue/S3 Docker Test Spark 4.1 / Scala 2.13
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      SPARK_VERSION: "4.1"
      SCALA_VERSION: "2.13"
      TEST_BACKENDS: glue
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: "maven"
      - name: Resolve Docker build args
        id: docker-args
        run: |
          make print-docker-build-args SPARK_VERSION=${SPARK_VERSION} SCALA_VERSION=${SCALA_VERSION} >> $GITHUB_OUTPUT
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build test-base image (cached)
        uses: docker/build-push-action@v6
        with:
          context: docker
          file: docker/Dockerfile.test-base
          load: true
          tags: lance-spark-test-base:${{ env.SPARK_VERSION }}_${{ env.SCALA_VERSION }}
          build-args: |
            SPARK_DOWNLOAD_VERSION=${{ steps.docker-args.outputs.spark-download-version }}
            SPARK_MAJOR_VERSION=${{ env.SPARK_VERSION }}
            SCALA_VERSION=${{ env.SCALA_VERSION }}
            PY4J_VERSION=${{ steps.docker-args.outputs.py4j-version }}
            SPARK_SCALA_SUFFIX=${{ steps.docker-args.outputs.spark-scala-suffix }}
          cache-from: type=gha,scope=test-base-${{ env.SPARK_VERSION }}_${{ env.SCALA_VERSION }}
          cache-to: type=gha,mode=max,scope=test-base-${{ env.SPARK_VERSION }}_${{ env.SCALA_VERSION }}
      - name: Build bundle
        run: make bundle SPARK_VERSION=${SPARK_VERSION} SCALA_VERSION=${SCALA_VERSION}
      - name: Build Glue/S3 test image
        run: |
          make docker-build-test \
            SPARK_VERSION=${SPARK_VERSION} \
            SCALA_VERSION=${SCALA_VERSION} \
            LANCE_NAMESPACE_IMPL_VERSION=${{ steps.docker-args.outputs.lance-namespace-impl-version }}
      - name: Verify AWS Glue/S3 targets
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}
          AWS_GLUE_CATALOG_ID: ${{ secrets.AWS_GLUE_CATALOG_ID }}
        run: |
          if [ -z "${AWS_S3_BUCKET_NAME}" ] || [ -z "${AWS_ACCESS_KEY_ID}" ] || [ -z "${AWS_SECRET_ACCESS_KEY}" ] || [ -z "${AWS_REGION}" ]; then
            echo "AWS_S3_BUCKET_NAME, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, and AWS_REGION secrets are required for Glue/S3 integration tests"
            exit 1
          fi
          aws --version
          echo "Verifying AWS STS identity"
          aws sts get-caller-identity
          echo "Verifying real S3 bucket with aws s3api head-bucket"
          aws s3api head-bucket --bucket "${AWS_S3_BUCKET_NAME}"
          glue_args=(--region "${AWS_REGION}" --max-results 1)
          if [ -n "${AWS_GLUE_CATALOG_ID}" ]; then
            glue_args+=(--catalog-id "${AWS_GLUE_CATALOG_ID}")
          fi
          echo "Verifying real AWS Glue catalog with aws glue get-databases"
          aws glue get-databases "${glue_args[@]}" >/dev/null
      - name: Run Glue/S3 Docker integration tests
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}
          AWS_GLUE_CATALOG_ID: ${{ secrets.AWS_GLUE_CATALOG_ID }}
          AWS_GLUE_ROOT: s3://${{ secrets.AWS_S3_BUCKET_NAME }}/lance_spark_glue_test_${{ github.run_id }}_${{ github.run_attempt }}_${{ env.SPARK_VERSION }}_${{ env.SCALA_VERSION }}
        run: |
          make docker-test \
            SPARK_VERSION=${SPARK_VERSION} \
            SCALA_VERSION=${SCALA_VERSION} \
            TEST_BACKENDS=${TEST_BACKENDS}
      - name: Clean up Glue/S3 test data
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}
          AWS_GLUE_ROOT: s3://${{ secrets.AWS_S3_BUCKET_NAME }}/lance_spark_glue_test_${{ github.run_id }}_${{ github.run_attempt }}_${{ env.SPARK_VERSION }}_${{ env.SCALA_VERSION }}
        run: |
          if [ -n "${AWS_S3_BUCKET_NAME}" ]; then
            aws s3 rm "${AWS_GLUE_ROOT}" --recursive || true
          fi
